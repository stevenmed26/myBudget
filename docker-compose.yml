services:
  postgres:
    image: postgres:16
    container_name: mybudget-postgres
    restart: unless-stopped
    env_file:
      - apps/api/.env
    volumes:
      - mybudget_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mybudget-api
    restart: unless-stopped
    env_file:
      - apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${API_PORT:-8080}:8080"

  adminer:
    image: adminer:4
    container_name: mybudget-adminer
    restart: unless-stopped
    profiles:
      - debug
    depends_on:
      - postgres
    ports:
      - "8081:8080"

volumes:
  mybudget_postgres_data:
