services:
  postgres:
    image: postgres:16
    container_name: mybudget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mybudget
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mybudget_postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mybudget"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mybudget-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mybudget?sslmode=disable
      DEMO_USER_ID: 11111111-1111-1111-1111-111111111111
    ports:
      - "8080:8080"

  adminer:
    image: adminer:4
    container_name: mybudget-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"

volumes:
  mybudget_postgres_data: