services:
  postgres:
    image: postgres:16
    container_name: mybudget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mybudget
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mybudget_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mybudget"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mybudget-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mybudget?sslmode=disable
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      ACCESS_TOKEN_TTL_MINUTES: 15
      REFRESH_TOKEN_TTL_DAYS: 30
      APP_ENV: development
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8080:8080"

  adminer:
    image: adminer:4
    container_name: mybudget-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"

volumes:
  mybudget_postgres_data:
